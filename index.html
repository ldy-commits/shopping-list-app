<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #5a67d8;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 7px 0;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      color: #718096;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .list-meta span {
      font-size: 0.82rem;
      color: #a0aec0;
    }

    .btn-clear {
      font-size: 0.82rem;
      color: #fc8181;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
    }

    .btn-clear:hover {
      color: #e53e3e;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 2px solid #e2e8f0;
      background: #fff;
      transition: all 0.2s;
      animation: fadeIn 0.2s ease;
    }

    li:hover {
      border-color: #c3dafe;
      background: #ebf4ff;
    }

    li.checked {
      background: #f7fafc;
      border-color: #e2e8f0;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      background: #fff;
    }

    li.checked .checkbox {
      background: #667eea;
      border-color: #667eea;
    }

    .checkbox::after {
      content: '';
      width: 6px;
      height: 11px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
      display: none;
    }

    li.checked .checkbox::after {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: all 0.2s;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #fc8181;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.95rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="80">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list-meta">
      <span id="countLabel">0개 항목</span>
      <button class="btn-clear" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <ul id="shoppingList"></ul>
    <div class="empty" id="emptyMsg" style="display:none;">아이템이 없습니다.</div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingItems') || '[]');
    let filter = 'all';

    const input = document.getElementById('itemInput');
    const list  = document.getElementById('shoppingList');
    const emptyMsg = document.getElementById('emptyMsg');
    const countLabel = document.getElementById('countLabel');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function save() {
      localStorage.setItem('shoppingItems', JSON.stringify(items));
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ id: Date.now(), text, checked: false });
      input.value = '';
      input.focus();
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const visible = items.filter(i => {
        if (filter === 'active') return !i.checked;
        if (filter === 'done')   return i.checked;
        return true;
      });

      const total   = items.length;
      const done    = items.filter(i => i.checked).length;
      countLabel.textContent = `${total}개 항목 (완료 ${done}개)`;

      list.innerHTML = '';
      if (visible.length === 0) {
        emptyMsg.style.display = 'block';
      } else {
        emptyMsg.style.display = 'none';
        visible.forEach(item => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          const cb = document.createElement('div');
          cb.className = 'checkbox';
          cb.onclick = () => toggleItem(item.id);

          const span = document.createElement('span');
          span.className = 'item-text';
          span.textContent = item.text;
          span.onclick = () => toggleItem(item.id);
          span.style.cursor = 'pointer';

          const del = document.createElement('button');
          del.className = 'btn-delete';
          del.innerHTML = '&#x2715;';
          del.title = '삭제';
          del.onclick = () => deleteItem(item.id);

          li.append(cb, span, del);
          list.appendChild(li);
        });
      }
    }

    render();
  </script>
</body>
</html>
